# Docker Compose for Saliksik AI - Full Stack
#
# Runs the complete application with PostgreSQL and Redis.
#
# Prerequisites:
#   1. Create a .env file: cp .env.example .env
#   2. Set a strong SECRET_KEY in .env
#
# Usage:
#   Start all:    docker-compose up -d --build
#   View logs:    docker-compose logs -f app
#   Stop:         docker-compose down
#   Clean all:    docker-compose down -v

services:
  # ============================================
  # FastAPI Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: saliksik-app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-saliksik}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-saliksik_ai}
      - SQLALCHEMY_DATABASE_URI=postgresql://${POSTGRES_USER:-saliksik}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-saliksik_ai}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - saliksik-network

  # ============================================
  # Database - PostgreSQL
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: saliksik-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saliksik_ai}
      POSTGRES_USER: ${POSTGRES_USER:-saliksik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saliksik} -d ${POSTGRES_DB:-saliksik_ai}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - saliksik-network

  # ============================================
  # Cache & Message Broker - Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: saliksik-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - saliksik-network

  # ============================================
  # Celery Worker (optional, uncomment to enable)
  # ============================================
  # celery:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.dev
  #   command: celery -A app.tasks.analysis worker --loglevel=info
  #   environment:
  #     - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-saliksik}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-saliksik_ai}
  #     - SQLALCHEMY_DATABASE_URI=postgresql://${POSTGRES_USER:-saliksik}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-saliksik_ai}
  #     - REDIS_URL=redis://redis:6379/0
  #     - CELERY_BROKER_URL=redis://redis:6379/1
  #     - CELERY_RESULT_BACKEND=redis://redis:6379/1
  #     - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
  #   depends_on:
  #     - db
  #     - redis
  #   restart: unless-stopped
  #   networks:
  #     - saliksik-network

volumes:
  postgres_data:
  redis_data:

networks:
  saliksik-network:
    driver: bridge
