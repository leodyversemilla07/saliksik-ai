# Docker Compose for Saliksik AI
# 
# Provides PostgreSQL and Redis for local development.
# Run the FastAPI app locally with: .\.venv\Scripts\uvicorn.exe main:app --reload
#
# Usage:
#   Start services:  docker-compose up -d
#   Stop services:   docker-compose down
#   View logs:       docker-compose logs -f

services:
  # ============================================
  # Database - PostgreSQL
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: saliksik-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saliksik_ai}
      POSTGRES_USER: ${POSTGRES_USER:-saliksik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saliksik} -d ${POSTGRES_DB:-saliksik_ai}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Cache - Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: saliksik-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
